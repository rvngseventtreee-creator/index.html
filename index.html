<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek PNR</title>

<style>
:root{ --primary:#0b3c75; }

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to bottom,#0b3c75,#1e5aa8);
}

.container{ max-width:420px; margin:auto; padding:15px; }

.header{ text-align:center; color:white; margin-bottom:15px; }

.card{
  background:white;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  font-weight:bold;
}

.loading{ display:none; text-align:center; }

.ticket{
  display:none;
  background:white;
  border-radius:16px;
  overflow:hidden;
}

.ticket-header{
  background:var(--primary);
  color:white;
  padding:12px;
}

.ticket-body{ padding:15px; font-size:14px; }

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.perforation{
  border-top:2px dashed #ccc;
  margin:12px 0;
}

.passenger{
  background:#f7f7f7;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

.timer{
  background:#ffe5e5;
  padding:8px;
  border-radius:8px;
  text-align:center;
}

.status{ font-weight:bold; margin-top:6px; }

.info{
  font-size:11px;
  color:gray;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- AUDIO FILE (OPTIONAL) -->
<audio id="clickSound" preload="auto">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="header">
  <h2>✈️ Cek PNR</h2>
  <p>Sistem Informasi Reservasi Penerbangan</p>
</div>

<div class="card">
  <input id="pnr" placeholder="Kode Booking (6 karakter)">
  <button onclick="playAllSound(); cekPNR()">Cek Status</button>
</div>

<div class="card loading" id="loading">
  Mengambil data reservasi...
</div>

<div class="ticket" id="ticket">
  <div class="ticket-header">
    <h3 id="airline"></h3>
    <small id="date"></small>
  </div>

  <div class="ticket-body">

    <div class="row"><span>PNR</span><b id="pnrOut"></b></div>
    <div class="row"><span>Rute</span><b id="rute"></b></div>
    <div class="row"><span>Flight</span><b id="flight"></b></div>

    <div class="perforation"></div>

    <div id="passengers"></div>

    <div class="perforation"></div>

    <div class="row"><span>Gate</span><b id="gate"></b></div>
    <div class="row"><span>Boarding</span><b id="boarding"></b></div>

    <div class="timer">
      ⏳ <span id="countdown">10:00</span>
    </div>

    <div class="status" id="status">BOOKING</div>

    <div class="info">
      Informasi ditampilkan berdasarkan kode booking pada sistem reservasi.
    </div>

  </div>
</div>

</div>

<script>
let time=600;
let timerInterval;

const airlines=["Garuda Indonesia","Lion Air","Batik Air","Citilink"];
const routes=["Jakarta → Bali","Makassar → Jakarta","Surabaya → Lombok","Kendari → Makassar"];

/* 🔊 BEEP INTERNAL (PASTI BUNYI) */
function beep(){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}

/* 🔊 GABUNGAN SOUND */
function playAllSound(){
  beep(); // pasti bunyi

  let audio=document.getElementById("clickSound");
  audio.currentTime=0;
  audio.play().catch(()=>{});
}

function validPNR(pnr){
  return /^[A-Z0-9]{6}$/.test(pnr);
}

function randomName(){
  const names=["Budi","Andi","Rina","Sari","Dewi","Agus"];
  return names[Math.floor(Math.random()*names.length)];
}

function generatePassengers(){
  let count=Math.floor(Math.random()*3)+1;
  let list="";
  for(let i=0;i<count;i++){
    list+=`<div class="passenger">${randomName()} - Seat ${Math.floor(Math.random()*30)}A</div>`;
  }
  return list;
}

function generateData(pnr){
  return {
    pnr,
    airline:airlines[Math.floor(Math.random()*airlines.length)],
    rute:routes[Math.floor(Math.random()*routes.length)],
    flight:"ID-"+Math.floor(Math.random()*900+100),
    gate:"G"+Math.floor(Math.random()*10),
    boarding:["08:00","10:30","14:00","19:00"][Math.floor(Math.random()*4)]
  };
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    let m=Math.floor(time/60);
    let s=time%60;
    if(s<10)s="0"+s;
    countdown.innerText=m+":"+s;
    time--;

    if(time<300){
      status.innerText="HOLD";
      status.style.color="red";
    }

    if(time<0){
      clearInterval(timerInterval);
      countdown.innerText="EXPIRED";
      status.innerText="EXPIRED";
    }
  },1000);
}

function cekPNR(){
  let pnr=document.getElementById("pnr").value.toUpperCase();

  if(!validPNR(pnr)){
    alert("PNR harus 6 karakter");
    return;
  }

  loading.style.display="block";
  ticket.style.display="none";

  setTimeout(()=>{
    loading.style.display="none";

    let d=generateData(pnr);

    airline.innerText=d.airline;
    pnrOut.innerText=d.pnr;
    rute.innerText=d.rute;
    flight.innerText=d.flight;
    gate.innerText=d.gate;
    boarding.innerText=d.boarding;

    date.innerText=new Date().toLocaleString("id-ID");

    passengers.innerHTML=generatePassengers();

    ticket.style.display="block";

    time=600;
    status.innerText="BOOKING";
    status.style.color="green";

    startTimer();
  },1500);
}
</script>

</body>
</html>
