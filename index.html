<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek PNR Pro Max</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #0b3c75, #1e5aa8);
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
}

button {
    background: #0b3c75;
    color: white;
    border: none;
}

/* BOARDING PASS STYLE */
.ticket {
    display: none;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    margin-top: 10px;
}

.ticket-header {
    background: #0b3c75;
    color: white;
    padding: 10px;
}

.ticket-body {
    padding: 15px;
    font-size: 14px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.qr {
    text-align: center;
    margin-top: 10px;
}

.timer {
    background: #ffe5e5;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
}

.actions button {
    margin-top: 10px;
}

.status {
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h3>✈️ Cek PNR</h3>

        <input type="text" id="pnr" placeholder="Kode PNR (6 karakter)">
        <input type="text" id="nama" placeholder="Nama Penumpang">

        <button onclick="cekPNR()">Cek Tiket</button>
    </div>

    <!-- BOARDING PASS -->
    <div class="ticket" id="ticket">
        <div class="ticket-header">
            <h3 id="airline"></h3>
        </div>

        <div class="ticket-body">
            <div class="row"><span>Nama</span><b id="namaOut"></b></div>
            <div class="row"><span>PNR</span><b id="pnrOut"></b></div>
            <div class="row"><span>Rute</span><b id="rute"></b></div>
            <div class="row"><span>Flight</span><b id="flight"></b></div>
            <div class="row"><span>Seat</span><b id="seat"></b></div>
            <div class="row"><span>Gate</span><b id="gate"></b></div>
            <div class="row"><span>Boarding</span><b id="boarding"></b></div>

            <div class="timer">
                ⏳ <span id="countdown">10:00</span>
            </div>

            <p class="status" id="status">BOOKING</p>

            <div class="qr" id="qrcode"></div>

            <div class="actions">
                <button onclick="downloadPDF()">Download Tiket</button>
                <button onclick="shareWA()">Kirim ke WhatsApp</button>
            </div>
        </div>
    </div>

</div>

<script>
let time = 600;
let timerInterval;

const airlines = ["Garuda Indonesia","Lion Air","Batik Air","Citilink"];
const routes = ["Jakarta → Bali","Makassar → Jakarta","Surabaya → Lombok","Kendari → Makassar"];

function validPNR(pnr){
    return /^[A-Z0-9]{6}$/.test(pnr);
}

function generateData(pnr,nama){
    return {
        nama: nama || "Guest",
        pnr: pnr,
        airline: airlines[Math.floor(Math.random()*airlines.length)],
        rute: routes[Math.floor(Math.random()*routes.length)],
        flight: "ID-"+Math.floor(Math.random()*900+100),
        seat: Math.floor(Math.random()*30)+"A",
        gate: "G"+Math.floor(Math.random()*10),
        boarding: ["08:00","10:30","14:00","19:00"][Math.floor(Math.random()*4)]
    };
}

function startTimer(){
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        let m = Math.floor(time/60);
        let s = time%60;
        if(s<10) s="0"+s;

        document.getElementById("countdown").innerText = m+":"+s;

        time--;

        if(time < 300){
            document.getElementById("status").innerText = "HOLD";
            document.getElementById("status").style.color = "red";
        }

        if(time < 0){
            clearInterval(timerInterval);
            document.getElementById("countdown").innerText = "EXPIRED";
            document.getElementById("status").innerText = "EXPIRED";
        }

    },1000);
}

function cekPNR(){
    let pnr = document.getElementById("pnr").value.toUpperCase();
    let nama = document.getElementById("nama").value;

    if(!validPNR(pnr)){
        alert("PNR harus 6 karakter!");
        return;
    }

    let d = generateData(pnr,nama);

    document.getElementById("airline").innerText = d.airline;
    document.getElementById("namaOut").innerText = d.nama;
    document.getElementById("pnrOut").innerText = d.pnr;
    document.getElementById("rute").innerText = d.rute;
    document.getElementById("flight").innerText = d.flight;
    document.getElementById("seat").innerText = d.seat;
    document.getElementById("gate").innerText = d.gate;
    document.getElementById("boarding").innerText = d.boarding;

    document.getElementById("ticket").style.display = "block";

    // QR CODE
    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), d.pnr+"-"+d.nama);

    time = 600;
    document.getElementById("status").innerText = "BOOKING";
    document.getElementById("status").style.color = "green";

    startTimer();
}

function downloadPDF(){
    window.print();
}

function shareWA(){
    let text = "Tiket PNR: "+document.getElementById("pnrOut").innerText;
    window.open("https://wa.me/?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
