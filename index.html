<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek PNR</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0b3c75, #1e5aa8);
    color: white;
}

.container {
    padding: 15px;
    max-width: 400px;
    margin: auto;
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #0b3c75;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

.result {
    display: none;
}

.status {
    color: green;
    font-weight: bold;
}

.warning {
    color: red;
    font-weight: bold;
}

.timer {
    background: #ffe5e5;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    margin-top: 10px;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Cek PNR</h2>
        <p>Status Penerbangan</p>
    </div>

    <div class="card">
        <label>Kode Booking (PNR)</label>
        <input type="text" id="pnr" placeholder="Contoh: ABC123">

        <label>Nama Penumpang</label>
        <input type="text" id="nama" placeholder="Contoh: Budi">

        <button onclick="cekPNR()">Cek Status</button>
    </div>

    <div class="card result" id="hasil">
        <h3>Detail Penerbangan</h3>
        <p><b>Nama:</b> <span id="rNama"></span></p>
        <p><b>Kode PNR:</b> <span id="rPNR"></span></p>
        <p><b>Rute:</b> Jakarta → Bali</p>
        <p><b>Seat:</b> 12A</p>
        <p><b>Class:</b> Ekonomi</p>
        <p><b>No E-Tiket:</b> 123-4567890123</p>
        <p><b>Jam:</b> 10:00 WIB</p>

        <div class="timer">
            ⏳ Batas Pembayaran: <span id="countdown">10:00</span>
        </div>

        <p class="warning">⚠️ Segera selesaikan pembayaran sebelum waktu habis!</p>
        <p class="status">Status: BOOKING</p>
    </div>

</div>

<script>
let time = 600; // 10 menit

function startTimer() {
    let timer = setInterval(function() {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        document.getElementById("countdown").innerText = minutes + ":" + seconds;

        time--;

        if (time < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerText = "Waktu Habis";
        }
    }, 1000);
}

function cekPNR() {
    let pnr = document.getElementById("pnr").value;
    let nama = document.getElementById("nama").value;

    if(pnr === "" || nama === "") {
        alert("Isi semua data!");
        return;
    }

    document.getElementById("rNama").innerText = nama;
    document.getElementById("rPNR").innerText = pnr;

    document.getElementById("hasil").style.display = "block";

    startTimer();
}
</script>

</body>
</html>
