<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyPNR</title>

<style>
:root{ --primary:#0b3c75; }

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#0b3c75,#1e5aa8);
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:linear-gradient(#0b3c75,#1e5aa8);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:9999;
  transition:0.6s;
}

.logo{
  font-size:32px;
  font-weight:bold;
  opacity:0;
  transform:scale(0.8);
  animation:logoIn 0.8s forwards;
}

.subtitle{
  font-size:12px;
  opacity:0;
  animation:fadeIn 1s 0.5s forwards;
}

.loader{
  margin-top:20px;
  width:40px;
  height:40px;
  border:4px solid white;
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

.splash-hide{
  opacity:0;
  pointer-events:none;
}

/* MAIN */
.container{
  max-width:420px;
  margin:auto;
  padding:15px;
}

.header{
  text-align:center;
  color:white;
  margin-bottom:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  box-sizing:border-box;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  font-weight:bold;
}

/* LOADING */
.loading{
  display:none;
  text-align:center;
}

/* TICKET */
.ticket{
  display:none;
  background:white;
  border-radius:16px;
  overflow:hidden;
  transform:scale(0.9);
  opacity:0;
  transition:0.4s;
}

.ticket.show{
  transform:scale(1);
  opacity:1;
}

.ticket-header{
  background:var(--primary);
  color:white;
  padding:12px;
}

.ticket-body{
  padding:15px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.perforation{
  border-top:2px dashed #ccc;
  margin:12px 0;
}

.passenger{
  background:#f7f7f7;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

.timer{
  background:#ffe5e5;
  padding:8px;
  border-radius:8px;
  text-align:center;
  margin-top:10px;
}

.status{
  font-weight:bold;
  margin-top:8px;
}

/* WA FLOAT */
.wa-float{
  position:fixed;
  right:20px;
  bottom:20px;
  width:55px;
  height:55px;
  background:#25D366;
  color:white;
  font-size:24px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:50%;
  text-decoration:none;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* ANIMATION */
@keyframes logoIn{ to{opacity:1; transform:scale(1);} }
@keyframes fadeIn{ to{opacity:1;} }
@keyframes spin{ to{transform:rotate(360deg);} }
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">✈️ SkyPNR</div>
  <div class="subtitle">Airline Reservation System</div>
  <div class="loader"></div>
</div>

<!-- SOUND -->
<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<div class="container">

<div class="header">
<h2>✈️ SkyPNR</h2>
<p>Sistem Reservasi Penerbangan</p>
</div>

<div class="card">
<input id="pnr" placeholder="Kode Booking (6 karakter)">
<button onclick="cekPNR()">Cek Status</button>
</div>

<div class="card loading" id="loading">
<p>Memproses data...</p>
</div>

<div class="ticket" id="ticket">
<div class="ticket-header">
<h3 id="airline"></h3>
<small id="date"></small>
</div>

<div class="ticket-body">

<div class="row"><span>PNR</span><b id="pnrOut"></b></div>
<div class="row"><span>Rute</span><b id="rute"></b></div>
<div class="row"><span>Flight</span><b id="flight"></b></div>

<div class="perforation"></div>

<div id="passengers"></div>

<div class="perforation"></div>

<div class="row"><span>Tanggal</span><b id="tanggal"></b></div>
<div class="row"><span>Berangkat</span><b id="depart"></b></div>
<div class="row"><span>Tiba</span><b id="arrive"></b></div>
<div class="row"><span>Gate</span><b id="gate"></b></div>

<div class="timer">⏳ <span id="countdown">10:00</span></div>
<div class="status" id="status">BOOKED</div>

</div>
</div>

</div>

<!-- WHATSAPP FLOAT -->
<a class="wa-float" href="#" onclick="kirimWA()">💬</a>

<script>
let time = 600;
let timer;

const airlines=["Garuda Indonesia","Lion Air","Batik Air","Citilink"];
const routes=["Jakarta → Bali","Makassar → Jakarta","Surabaya → Lombok","Kendari → Makassar"];

/* SPLASH */
window.onload=()=>{
setTimeout(()=>{
splash.classList.add("splash-hide");
setTimeout(()=>splash.style.display="none",600);
},2000);
};

/* SOUND */
function beep(){
let ctx=new(window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.frequency.value=800;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.1);
}

function playSound(){
beep();
clickSound.currentTime=0;
clickSound.play().catch(()=>{});
}

/* VALID */
function validPNR(p){
return /^[A-Z0-9]{6}$/.test(p);
}

/* DATA */
function randomTime(){
let h=Math.floor(Math.random()*24);
let m=Math.floor(Math.random()*60);
return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

function genPassengers(){
let names=["Budi","Andi","Rina","Sari","Dewi","Agus"];
let c=Math.floor(Math.random()*3)+1;
let html="";
for(let i=0;i<c;i++){
html+=`<div class="passenger">${names[Math.floor(Math.random()*names.length)]} - Seat ${Math.floor(Math.random()*30)}A</div>`;
}
return html;
}

function generateData(pnr){
return{
pnr,
airline:airlines[Math.floor(Math.random()*airlines.length)],
rute:routes[Math.floor(Math.random()*routes.length)],
flight:"ID-"+Math.floor(Math.random()*900+100),
gate:"G"+Math.floor(Math.random()*10),
tanggal:new Date().toLocaleDateString("id-ID"),
depart:randomTime(),
arrive:randomTime()
};
}

/* TIMER */
function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
countdown.innerText=m+":"+(s<10?"0"+s:s);
time--;

if(time<400){
status.innerText="ISSUED";
status.style.color="green";
}

if(time<200){
status.innerText="CHECK-IN";
status.style.color="blue";
}

if(time<0){
clearInterval(timer);
countdown.innerText="EXPIRED";
status.innerText="EXPIRED";
status.style.color="red";
}
},1000);
}

/* MAIN */
function cekPNR(){
let pnr=document.getElementById("pnr").value.toUpperCase();

if(!validPNR(pnr)){
alert("PNR harus 6 karakter");
return;
}

loading.style.display="block";
ticket.classList.remove("show");

setTimeout(()=>{
loading.style.display="none";

let d=generateData(pnr);

airline.innerText=d.airline;
pnrOut.innerText=d.pnr;
rute.innerText=d.rute;
flight.innerText=d.flight;
gate.innerText=d.gate;

tanggal.innerText=d.tanggal;
depart.innerText=d.depart;
arrive.innerText=d.arrive;

date.innerText=new Date().toLocaleString("id-ID");

passengers.innerHTML=genPassengers();

ticket.style.display="block";
setTimeout(()=>ticket.classList.add("show"),50);

beep();

time=600;
status.innerText="BOOKED";
status.style.color="orange";

startTimer();

},1200);
}

/* WHATSAPP */
function kirimWA(){
let text=`✈️ SkyPNR
PNR: ${pnrOut.innerText}
Rute: ${rute.innerText}
Flight: ${flight.innerText}
Status: ${status.innerText}`;

window.open("https://wa.me/?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
