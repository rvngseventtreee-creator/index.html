<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cek PNR</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.header {
  text-align: center;
  color: white;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.container {
  max-width: 400px;
  margin: 20px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #4facfe;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  padding: 10px;
  border-radius: 8px;
  background: #eef;
  display: none;
}

.admin {
  margin-top: 30px;
  border-top: 2px solid #ddd;
  padding-top: 15px;
}
</style>

</head>
<body>

<div class="header">✈️ Sistem Cek PNR</div>

<div class="container">
  <h3>Cek PNR</h3>
  <input type="text" id="pnr" placeholder="Kode PNR">
  <button onclick="cekPNR()">Cek</button>
  <div id="hasil" class="result"></div>

  <div class="admin">
    <h3>Admin Input PNR</h3>
    <input id="a_pnr" placeholder="PNR">
    <input id="a_nama" placeholder="Nama">
    <input id="a_rute" placeholder="Rute">
    <input id="a_jam" placeholder="Jam">
    <input id="a_class" placeholder="Class">
    <input id="a_status" placeholder="Status">
    <input id="a_meal" placeholder="Meal">
    <input id="a_bagasi" placeholder="Bagasi">
    <button onclick="tambahPNR()">Simpan</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "API_KEY_KAMU",
  authDomain: "PROJECT_KAMU.firebaseapp.com",
  projectId: "PROJECT_KAMU",
  storageBucket: "PROJECT_KAMU.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔎 CEK PNR
async function cekPNR() {
  const pnr = document.getElementById("pnr").value.toUpperCase();
  const hasil = document.getElementById("hasil");

  const doc = await db.collection("pnr").doc(pnr).get();

  if (doc.exists) {
    const d = doc.data();
    hasil.style.display = "block";
    hasil.innerHTML = `
      👤 ${d.nama}<br>
      🛫 ${d.rute}<br>
      ⏰ ${d.jam}<br>
      💺 ${d.class}<br>
      📊 ${d.status}<br>
      🍽 ${d.meal}<br>
      🎒 ${d.bagasi}
    `;
  } else {
    hasil.style.display = "block";
    hasil.innerHTML = "❌ PNR tidak ditemukan";
  }
}

// ➕ TAMBAH DATA
async function tambahPNR() {
  const pnr = document.getElementById("a_pnr").value.toUpperCase();

  await db.collection("pnr").doc(pnr).set({
    nama: document.getElementById("a_nama").value,
    rute: document.getElementById("a_rute").value,
    jam: document.getElementById("a_jam").value,
    class: document.getElementById("a_class").value,
    status: document.getElementById("a_status").value,
    meal: document.getElementById("a_meal").value,
    bagasi: document.getElementById("a_bagasi").value
  });

  alert("✅ Data berhasil disimpan!");
}
</script>

</body>
</html>
