<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek PNR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    h2 {
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 20px;
      background: #eef;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Cek PNR</h2>
  <input type="text" id="pnr" placeholder="Masukkan Kode PNR">
  <button onclick="cekPNR()">Cek</button>

  <div id="hasil" class="result" style="display:none;"></div>
</div>

<script>
function cekPNR() {
  const pnr = document.getElementById("pnr").value.toUpperCase();

  // Data dummy (contoh database)
  const dataPNR = {
    "ABC123": {
      nama: "Akbar",
      rute: "Makassar - Jakarta",
      jam: "10:30",
      class: "Economy",
      status: "Confirmed",
      meal: "Nasi + Ayam",
      bagasi: "20kg"
    },
    "XYZ789": {
      nama: "Budi",
      rute: "Surabaya - Bali",
      jam: "14:00",
      class: "Business",
      status: "On Time",
      meal: "Seafood",
      bagasi: "30kg"
    }
  };

  const hasil = document.getElementById("hasil");

  if (dataPNR[pnr]) {
    const d = dataPNR[pnr];
    hasil.style.display = "block";
    hasil.innerHTML = `
      <b>Nama:</b> ${d.nama}<br>
      <b>Rute:</b> ${d.rute}<br>
      <b>Jam Terbang:</b> ${d.jam}<br>
      <b>Class:</b> ${d.class}<br>
      <b>Status:</b> ${d.status}<br>
      <b>Meal:</b> ${d.meal}<br>
      <b>Bagasi:</b> ${d.bagasi}
    `;
  } else {
    hasil.style.display = "block";
    hasil.innerHTML = "PNR tidak ditemukan!";
  }
}
</script>

</body>
</html>
